{% extends "base.html" %}
{% block title_suffix %} — Chat{% endblock %}
{% block page_title %}Chat{% endblock %}
{% block content %}
<div class="chat-container">
    <div class="chat-messages" id="messages">
        <div class="chat-msg koan">
            <div class="sender">Kōan</div>
            <div>Hi. Send a message or a mission.</div>
        </div>
    </div>
    <div class="chat-input">
        <textarea id="input" class="k-textarea" placeholder="Type here..." onkeydown="handleKey(event)"></textarea>
        <div class="actions">
            <button class="k-btn k-btn--primary" onclick="send('chat')">
                <i data-lucide="send"></i> Send
            </button>
            <button class="k-btn k-btn--secondary" onclick="send('mission')">
                <i data-lucide="plus"></i> Mission
            </button>
        </div>
    </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function addMessage(sender, text, cls) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + cls;
    div.innerHTML = '<div class="sender">' + escapeHtml(sender) + '</div><div>' + escapeHtml(text) + '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send('chat');
    }
    if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        send('mission');
    }
}

async function send(mode) {
    const text = input.value.trim();
    if (!text) return;

    addMessage('You', text, 'human');
    input.value = '';

    if (mode === 'mission') {
        addMessage('Kōan', 'Mission added.', 'koan');
    }

    // Show loading indicator for chat replies
    const loadingId = 'loading-' + Date.now();
    if (mode === 'chat') {
        const div = document.createElement('div');
        div.className = 'chat-msg koan loading';
        div.id = loadingId;
        div.innerHTML = '<div class="sender">Kōan</div><div><span class="spinner"></span> Thinking...</div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    const form = new FormData();
    form.append('message', text);
    form.append('mode', mode);

    try {
        const resp = await fetch('/chat/send', { method: 'POST', body: form });
        const data = await resp.json();

        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        if (data.ok && data.type === 'chat') {
            addMessage('Kōan', data.response, 'koan');
        } else if (data.ok && data.type === 'mission') {
            // Confirmation already shown above
        } else if (data.error) {
            addMessage('Kōan', 'Error: ' + data.error, 'koan');
        }
    } catch (e) {
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();
        addMessage('Kōan', 'Connection error.', 'koan');
    }
}

if (window.lucide) lucide.createIcons();
</script>
{% endblock %}
