{% extends "base.html" %}
{% block title_suffix %} — Progress{% endblock %}
{% block page_title %}Live Progress{% endblock %}
{% block topbar_actions %}
<span class="k-status" id="progress-status"><span class="k-status__dot"></span> Connecting…</span>
{% endblock %}
{% block content %}
<div class="k-card">
    <div class="k-card__header">
        <h2 class="k-card__title" style="margin:0;">Current run output</h2>
        <label class="k-check">
            <input type="checkbox" id="autoscroll" checked> Auto-scroll
        </label>
    </div>
    <pre id="progress-output" class="k-terminal" style="min-height:400px;max-height:600px;">Waiting for output…</pre>
</div>

<script>
(function() {
    const output = document.getElementById('progress-output');
    const status = document.getElementById('progress-status');
    const autoscroll = document.getElementById('autoscroll');

    function setStatus(text, kind) {
        status.textContent = '';
        const dot = document.createElement('span');
        dot.className = 'k-status__dot';
        status.className = 'k-status k-status--' + kind;
        status.appendChild(dot);
        status.appendChild(document.createTextNode(' ' + text));
    }

    function connectSSE() {
        const source = new EventSource('/api/progress/stream');

        source.onopen = function() { setStatus('Connected', 'success'); };

        source.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.content !== undefined) {
                output.textContent = data.content || 'Waiting for output…';
                if (autoscroll.checked) {
                    output.scrollTop = output.scrollHeight;
                }
            }
        };

        source.onerror = function() {
            setStatus('Disconnected — reconnecting…', 'queued');
            source.close();
            setTimeout(connectSSE, 3000);
        };
    }

    connectSSE();
})();
</script>
{% endblock %}
