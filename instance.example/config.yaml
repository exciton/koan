# Kōan Configuration
#
# IMPORTANT: Values starting with "CHANGE:" must be updated before running.
# Kōan will work with sensible defaults for most other settings.

# Paths — these are mostly set via environment variables now.
# You can override here if needed, but KOAN_PROJECT_PATH / KOAN_PROJECTS
# in .env is the preferred method.
# project_path: "/path/to/your/project"
# pilot_repo: "/path/to/koan"

# Start on pause — boot directly into pause mode
# When true, Kōan starts paused and waits for an explicit /resume before
# picking up missions. Useful for scheduled launches (cron, launchd) where
# you want the stack running but idle until you're ready.
# Manual pauses (/pause) are preserved; stale system pauses (quota, max_runs)
# are replaced with a clean start_on_pause reason.
# The /resume command sets KOAN_SKIP_START_PAUSE=1 internally so auto-restart
# after resume doesn't immediately re-pause.
# start_on_pause: false

# Start in passive mode — boot into read-only mode
# When true, Kōan starts in passive mode: the loop runs (heartbeat, GitHub
# notification polling, Telegram commands) but never executes missions or
# autonomous work. Use /active to resume normal execution.
# start_passive: false

# Focus mode (permanent) — only run explicitly queued missions
# When true, Kōan becomes a pure "mission executor": no DEEP mode, no
# contemplative sessions, no autonomous exploration. Only missions queued
# via /mission (Telegram), recurring missions, and GitHub @mention commands
# are executed. The loop idles (wake-on-mission) whenever the queue is empty.
#
# This is the config-level permanent switch. The /focus Telegram command
# provides time-bounded focus (e.g. /focus 3h). Both produce the same
# runtime behavior.
#
# Per-project override: set focus: true/false in projects.yaml under
# defaults or individual projects. Config.yaml sets the global default.
#
# Differs from passive mode:
#   - passive = no execution at all (missions stay Pending)
#   - focus   = autonomous work disabled, but missions still run
#
# Env override: KOAN_FOCUS=1 (truthy values)
# focus: false

# Multiple instances — acknowledge that several Kōan instances share
# the same GitHub account, each watching a different set of repos.
# When true, Kōan suppresses warnings about @mentions on repos not in
# this instance's projects.yaml (another instance likely handles them).
# enable_multiple_instances: false

# Startup reflection — run self-reflection check on startup
# When true, Kōan checks whether periodic self-reflection is due (every N
# sessions) and, if so, invokes Claude to generate observations. Disabled by
# default to avoid unexpected Claude CLI calls at boot time.
# startup_reflection: false

# Budget & Scheduling
# These are the primary source of truth for run loop configuration.
# max_runs_per_day: Maximum runs before auto-pause (resets on /resume or quota reset)
# interval_seconds: Seconds between runs (how often the loop iterates)
max_runs_per_day: 20
interval_seconds: 300

# Startup delay — seconds to wait before the first mission after boot.
# Gives you time to send /pause before any mission runs.
# Set to 0 to disable. Skipped automatically if already paused at startup.
# startup_delay: 30

# Auto-pause — automatically pause after max_runs or idle timeout.
# When false, Kōan keeps running indefinitely (quota and error pauses still apply).
# Useful when you have scheduled recurring tasks that must fire reliably.
# auto_pause: true

# Notification polling — shared protection for always-on instances.
# Provider-specific github/jira polling settings below can still override these
# values, but this shared section is the recommended default. When auto_pause is
# false, quiet idle loops still wait on this backoff instead of hot-looping.
# notification_polling:
#   check_interval_seconds: 60       # Base polling interval (default: 60, min: 10)
#   max_check_interval_seconds: 300  # Idle backoff cap (default: 300, min: 30)

# Prompt caching behavior
# Keep consecutive autonomous runs on the same project to preserve
# prompt-prefix cache warmth across iterations.
# 0 = disabled (always avoid repeating last project, legacy behavior)
# 100 = always stay on the previous project when still eligible
# prompt_caching:
#   same_project_stickiness_percent: 30

# Fast reply mode — use lightweight model (Haiku) for command handlers
# When true, /usage, /sparring, and similar commands use Haiku instead of default model
# Faster response, lower cost, but simpler answers
fast_reply: false

# Debug mode — write detailed mission execution logs to .koan-debug.log
# Use `tail -f .koan-debug.log` to watch dispatch decisions, commands, and errors
# debug: false

# CLI output journal — stream CLI output to the daily journal file in real-time
# When enabled, mission and contemplative CLI output is appended to the project's
# journal file as it runs. Use `tail -f instance/journal/YYYY-MM-DD/project.md`
# to watch the agent work. Set to false to disable.
# cli_output_journal: true

# Branch prefix — used for all agent-created branches
# Default is "koan" which creates branches like "koan/fix-something"
# Change this for multi-bot setups to avoid branch name collisions
# e.g., "koan-alice" creates branches like "koan-alice/fix-something"
# branch_prefix: "koan"

# CI fix max attempts — maximum number of Claude-based fix attempts per PR
# When CI fails after a rebase/push, Kōan will attempt to fix it up to this
# many times. Each attempt: fetch failure logs → run Claude → force-push →
# re-check. The counter is stored in the ## CI section of missions.md, so
# it's visible in your task queue. Default: 5.
# ci_fix_max_attempts: 5

# Skill timeout — maximum seconds for heavy skill execution (fix, implement, recreate)
# These skills invoke Claude with full tool access and can run for a long time.
# Complex /implement missions with multi-phase plans routinely exceed 60 min.
# Increase if you see timeouts on complex issues; decrease to save quota.
# Default: 7200 (2 hours). Previous default was 3600 (60 minutes).
skill_timeout: 7200

# First output timeout — kill skill subprocesses that stay silent too long.
# Default: 600 (10 min). Set 0 to disable.
# first_output_timeout: 600

# Rebase first output timeout — optional override for /rebase skill runs.
# Useful for large PRs where "Applying review feedback" can be quiet for longer.
# Falls back to first_output_timeout when unset.
# rebase_first_output_timeout: 1800

# Rebase review phase inactivity timeout — if no real CLI/tool output is seen
# for this long during review-feedback application, abort as stalled.
# Defaults to rebase_first_output_timeout.
# rebase_review_idle_timeout: 1800

# Rebase review phase hard cap — maximum total seconds allowed for review
# feedback application even when activity continues.
# Defaults to skill_timeout.
# rebase_review_max_duration: 10800

# Rebase CI-fix inactivity timeout — same semantics as review idle timeout,
# applied to CI-fix attempts in /rebase flow.
# Defaults to rebase_first_output_timeout.
# rebase_ci_idle_timeout: 1800

# Rebase CI-fix hard cap — maximum total seconds allowed for a CI-fix step.
# Defaults to skill_timeout.
# rebase_ci_max_duration: 7200

# Include bot-authored review/issue comments in /rebase feedback analysis.
# Default true uses bot comments by design; set false to keep noisy
# third-party CI/bot comments out of the review-feedback prompt. Kōan's own
# comments are always kept, so feedback from a previous review/rebase
# iteration is preserved.
# rebase_include_bot_feedback: true

# Maximum conflict resolution rounds during rebase.
# Each conflicting commit consumes one round — multi-commit PRs with many
# conflicts may need more than the default.  Set higher for large repos.
# rebase_max_conflict_rounds: 10

# Allow /rebase on PRs not created by this instance.
# Default false keeps the branch-prefix ownership guard in Telegram /rebase.
# Set true only when you intentionally want to rebase any writable PR.
# allow_rebase_foreign_prs: false

# Strip Co-Authored-By / "Generated with Claude Code" trailers from generated
# commit messages. Off by default — commits keep whatever trailers the CLI
# appends. Set true to make Kōan commits land under the operator's own git
# identity with no co-author attribution.
# strip_co_authored_by: false

# Skill max turns — maximum agentic turns for heavy skill execution
# Controls how many back-and-forth turns Claude CLI is allowed during
# /implement, /fix, and /incident invocations. Complex multi-step plans
# may need more turns to complete. If you see "Reached max turns (N)"
# errors, increase this value.
# Default: 200.
# skill_max_turns: 200

# Analysis max turns — maximum turns for read-only analysis skills
# Controls how many turns Claude CLI is allowed during /dead_code,
# /tech_debt, /audit, /brainstorm, and /deepplan invocations. These
# skills only use read tools (Read, Glob, Grep). The dead_code skill
# includes Python AST pre-analysis to reduce turn consumption, but
# large codebases may still need more headroom.
# Default: 75.
# analysis_max_turns: 75

# Contemplative max turns — maximum turns for reflective sessions
# Controls how many turns Claude CLI is allowed during contemplative
# reflection. The contemplative prompt reads several memory files
# (soul.md, summary.md, personality-evolution.md, learnings.md) and
# writes output — requiring at least 6-7 tool calls. Too few turns
# causes sessions to hit the limit before producing any output.
# Default: 15.
# contemplative_max_turns: 15

# Reasoning effort level — controls Claude's --effort flag per autonomous mode.
# Higher effort = deeper reasoning but more tokens. Accepts per-mode overrides
# or a single value for all modes. Valid levels: low, medium, high, max.
# Omit or set to "" to use no --effort flag (provider default).
# Default: review=low, implement=(none), deep=high.
# effort:
#   review: low
#   implement: medium
#   deep: high

# Extended thinking / reasoning controls — activates the provider's
# extended-thinking mode (e.g. Claude's --effort max) for missions
# classified as "critical" complexity tier AND at or above the
# configured minimum autonomous mode.
# Disabled by default. Thinking only triggers for the most complex
# missions (critical tier) when the mode qualifies.
# thinking:
#   enabled: true
#   budget_tokens: 10000   # soft cap (provider-dependent; 0 = no cap)
#   min_mode: deep         # one of: wait, review, implement, deep

# Post-mission pipeline timeout — maximum seconds for the steps that run after
# a mission completes: verification, reflection, PR review learning, auto-merge.
# Increase if post-mission steps are being cut short; decrease to keep the loop snappy.
# Default: 300 (5 minutes).
# post_mission_timeout: 300

# Forward Claude's final result text to outbox.md when a mission's outcome is an
# alert (SKIP / FAIL / ERROR / BLOCKED, "permission deadlock", "no PR opened",
# etc.) or when the mission title matches a skill that opted in via SKILL.md
# (see "Result forwarding" in koan/skills/README.md — set `forward_result: true`
# on the skill's SKILL.md frontmatter to enable). Guarantees the user sees the
# result on Telegram even when the Claude session's sandbox blocked writes to
# instance/.
# Default: true. Set to false to silence the forwarder entirely.
# notify_mission_results: true

# Stagnation detection — abort Claude sessions stuck in a loop long before
# mission_timeout would kill them, saving quota.
# How it works: a daemon thread samples the subprocess stdout every
# ``check_interval_seconds`` and hashes the last ``sample_lines`` lines.
# After ``abort_after_cycles`` consecutive identical hashes, the monitor
# kills the process group and re-queues the mission to Pending so a fresh
# Claude run can try again. After ``max_retry_on_stagnation`` consecutive
# stagnation re-queues for the same mission, it is marked Failed with a
# [stagnation] cause tag in missions.md and a distinct Telegram message.
# Set ``max_retry_on_stagnation: 0`` to skip retries (fail on first stagnation).
# Per-project overrides go in projects.yaml under ``stagnation:`` (set
# ``stagnation: false`` or ``stagnation.enabled: false`` to disable).
# stagnation:
#   enabled: true
#   check_interval_seconds: 60
#   abort_after_cycles: 3
#   sample_lines: 50
#   max_retry_on_stagnation: 3

# Autonomous health diagnostics — automatically inject diagnostic missions
# (tech_debt, dead_code, or audit) when a project's success rate falls below
# a threshold and it has accumulated consecutive non-productive sessions.
# Diagnostic type selection:
#   - "declining" trend  → tech_debt (structural issues causing failures)
#   - many "empty" sessions → dead_code (cleanup to unblock exploration)
#   - many "blocked"/stagnated sessions → audit (deeper investigation)
# Disabled by default — opt in when you want self-healing behavior.
# autonomous_health:
#   enabled: false              # Master switch (default: false)
#   success_rate_floor: 0.25    # Trigger below this success rate (default: 0.25)
#   staleness_floor: 3          # Consecutive non-productive sessions required (default: 3)
#   cooldown_days: 21           # Min days between diagnostics per project (default: 21)
#   min_mode: implement         # Minimum autonomous mode required (default: implement)

# Review comment dispatch — auto-create missions when human reviewers
# leave comments on Koan's open PRs.  Uses fingerprint-based dedup
# (sorted comment ID hashes) to dispatch only on new/changed comments.
# State tracked in instance/.review-dispatch-tracker.json.
# Disabled by default — opt in when you want automatic PR comment follow-up.
# review_dispatch:
#   enabled: false                # Master switch (default: false)
#   cooldown_minutes: 30          # Min minutes between checks per project (default: 30)

# Review reply guard — prevents the bot from replying to itself in PR
# comment threads and caps the total depth of any single thread.
# When the bot is the last poster in a thread and no human followed up,
# the thread is excluded from the repliable list on the next review run.
# review_reply:
#   max_thread_depth: 5           # Stop replying after this many comments in a thread (default: 5)

# Contemplative mode trigger chance (0-100%)
# When no mission is pending, this is the probability of running a reflective
# session instead of autonomous work. Allows regular moments of introspection
# without waiting for budget exhaustion.
# 0 = never contemplative, 10 = ~1 in 10 runs, 20 = ~1 in 5 runs
contemplative_chance: 10

# Notification priority filtering
# Controls which priority levels are sent to Telegram vs written to the daily journal.
# Priority levels (highest to lowest): urgent, action, warning, info
#   urgent  — critical failures, quota exhausted (always sent)
#   action  — mission complete, command responses (default threshold)
#   warning — quota low, focus validation warnings
#   info    — progress updates, reflections
# Messages below min_priority are suppressed from Telegram and written to the daily
# journal instead (under a "notifications" project entry), so nothing is lost.
# Default: "action" (sends urgent + action; suppresses warning + info)
# notifications:
#   min_priority: action

# Telegram
# NOTE: Prefer setting these in .env (KOAN_TELEGRAM_TOKEN, KOAN_TELEGRAM_CHAT_ID)
# These config values are only used if the env vars are not set.
telegram:
  bot_token: ""   # Set via KOAN_TELEGRAM_TOKEN in .env (recommended)
  chat_id: ""     # Set via KOAN_TELEGRAM_CHAT_ID in .env (recommended)

# Messaging provider configuration (optional)
# Controls which messaging platform Kōan uses for communication.
# If not specified, defaults to "telegram" (backward compatible).
# Can also be set via KOAN_MESSAGING_PROVIDER env var (overrides this).
#
# Recommended: configure here in config.yaml rather than via env vars.
# Env vars (KOAN_MATRIX_*, KOAN_SLACK_*, KOAN_TELEGRAM_*) are kept as
# legacy/override fallbacks but the cleaner setup lives here.
#
# Telegram and Slack credentials still come from env vars (see env.example).
# Matrix supports config.yaml directly:
#
# messaging:
#   provider: "telegram"  # "telegram" (default), "slack", "matrix", or "discord"
#   matrix:
#     homeserver: "https://matrix.org"
#     user_id: "@koan:matrix.org"
#     room_id: "!abcdefghijk:matrix.org"
#     access_token: "syt_your_token_here"
#   discord:
#     bot_token: "Bot token from Discord Developer Portal"  # or KOAN_DISCORD_BOT_TOKEN env var
#     channel_id: "123456789012345678"                      # or KOAN_DISCORD_CHANNEL_ID env var

# Usage thresholds
budget:
  warn_at_percent: 70   # Send warning via Telegram
  stop_at_percent: 85   # Stop running

# Claude tools configuration
# SECURITY: Chat and missions have separate tool sets to prevent prompt injection.
# Telegram messages are untrusted input — they only get read-only tools.
tools:
  # Chat tools — restricted set for Telegram/dashboard conversations
  # Default is read-only: no Bash, Edit, or Write to prevent prompt injection
  chat: ["Read", "Glob", "Grep"]
  # Mission tools — full access for autonomous execution
  mission: ["Read", "Glob", "Grep", "Edit", "Write", "Bash"]
  description: |
    Available capabilities:
    - File operations: Read, Edit, Write files in the project
    - Search: Glob (find files), Grep (search content)
    - Shell: Bash (run git, gh, make, and other commands)

# CLI provider — which AI CLI to use as the backend
# Options: "claude" (default), "codex" (OpenAI Codex CLI), "copilot" (GitHub Copilot CLI),
#          "local" (local LLM via OpenAI-compatible API), "ollama-launch" (Ollama-managed Claude CLI)
# Can also be set via KOAN_CLI_PROVIDER env var (overrides this)
cli_provider: "claude"

# Skip permission prompts/sandboxing for CLI providers.
# Claude: adds --dangerously-skip-permissions; does not work when Koan runs as root.
# Codex: adds --dangerously-bypass-approvals-and-sandbox so Codex can use git
# directly. Only enable this when Koan already runs in a trusted external sandbox.
# For MCP tools, use provider-specific allowlists/settings instead.
# See docs/provider-claude.md and docs/provider-codex.md for details.
# skip_permissions: false

# MCP server configuration — paths to MCP config JSON files.
# Passed as --mcp-config to the Claude CLI.
# For autonomous mode, pre-approve MCP tools in the project's
# .claude/settings.local.json (see docs/provider-claude.md).
# Per-project overrides available in projects.yaml (replaces global list).
# mcp:
#   - "/path/to/mcp-servers.json"

# Local LLM configuration (used when cli_provider: "local")
# Connects to any OpenAI-compatible API server:
#   - Ollama:     http://localhost:11434/v1
#   - llama.cpp:  http://localhost:8080/v1
#   - LM Studio:  http://localhost:1234/v1
#   - vLLM:       http://localhost:8000/v1
# Can also be set via KOAN_LOCAL_LLM_* env vars (override config values)
# local_llm:
#   base_url: "http://localhost:11434/v1"
#   model: "glm4"
#   api_key: ""   # Usually empty for local servers

# Ollama Launch configuration (used when cli_provider: "ollama-launch")
# Uses Ollama v0.16.0+ ``ollama launch claude`` to run the Claude Code CLI
# through an Ollama-managed server. Ollama handles ``ANTHROPIC_BASE_URL`` and
# server lifecycle automatically — no manual env vars needed.
#
# The model is passed to Ollama's --model flag (before the -- separator).
# Everything after -- is forwarded to the Claude Code CLI verbatim, so
# all Claude features (tools, streaming, session resume, MCP, effort)
# work exactly as with the native claude provider.
#
# Can also be set via KOAN_OLLAMA_LAUNCH_MODEL env var (overrides this).
# ollama_launch:
#   model: "qwen2.5-coder:14b"   # Model name as known to Ollama

# Model configuration — controls which models are used for different types of calls.
# Resolution order per key:
#   1. per-project models.{key} (in projects.yaml)
#   2. models.{provider}.{key} (provider-specific, applies to current provider)
#   3. models.default.{key} (global fallback)
#   4. Built-in default
#
# Empty string = use default model (subscription default or provider default).
#
# Structure: models.default applies to all providers; models.{provider} overrides
# for a specific provider. Provider names can use hyphens or underscores.
#
# Examples:
#   models.claude — Claude provider overrides
#   models.codex — OpenAI Codex provider overrides
#   models.ollama-launch OR models.ollama_launch — Ollama provider overrides
#
# Legacy flat structure (models.mission, models.chat, etc.) is still supported
# with a deprecation warning — migrate at your convenience.

models:
  default:
    mission: ""              # Main mission execution (empty = default)
    chat: ""                 # Telegram/dashboard chat responses
    lightweight: "haiku"     # Low-cost calls: format_outbox, pick_mission, contemplative
    fallback: "sonnet"       # Fallback when primary model is overloaded
    review_mode: ""          # Override model for REVIEW mode (cheaper audits)
    reflect: ""              # Model for review reflection pass (empty = lightweight)

  # Claude provider overrides (uncomment to customize):
  # claude:
  #   mission: ""              # Main mission execution
  #   chat: ""                 # Chat responses
  #   lightweight: "haiku"     # Low-cost calls
  #   fallback: "sonnet"       # Fallback when primary is overloaded
  #   review_mode: ""          # Override model for REVIEW mode
  #   reflect: ""              # Model for review reflection pass

  # Codex (OpenAI) provider overrides (uncomment to customize):
  # codex:
  #   mission: "gpt-5.3-codex"      # complex implementation
  #   chat: "gpt-5.5"               # general discussion / planning
  #   lightweight: "gpt-5.5"        # simple tasks if cost is acceptable
  #   fallback: ""                   # empty = use provider default
  #   review_mode: "gpt-5.3-codex"  # serious code review
  #   reflect: "gpt-5.5"            # summarize / reason about result

  # Ollama Launch provider overrides (uncomment to customize):
  # ollama-launch:
  #   mission: "qwen2.5-coder:14b"   # main mission execution
  #   chat: "qwen2.5-coder:14b"      # chat responses
  #   lightweight: "qwen2.5-coder:7b" # low-cost calls
  #   fallback: ""                    # empty = use provider default
  #   review_mode: "qwen2.5-coder:14b"
  #   reflect: "qwen2.5-coder:7b"

# Branch cleanup — automatic deletion of merged branches during git sync
# Every git_sync_interval iterations, Kōan detects merged branches (both
# regular merges via git ancestry and squash/rebase merges via GitHub API)
# and deletes them locally. Enable delete_remote_branches to also push-delete
# the corresponding remote refs (safe: only agent-prefixed branches are touched,
# the current branch is never deleted, and remote deletion failures are ignored
# if the remote branch was already removed by GitHub's auto-delete).
# branch_cleanup:
#   enabled: true                  # Master switch (default: true)
#   delete_remote_branches: true   # Also delete remote refs (default: true)
#                                  # Set false to only clean up local branches
#   cleanup_interval_hours: 24     # Hours between cleanup runs per project (default: 24)
#                                  # Persisted in .branch-cleanup-tracker.json — survives restarts
#   notify_orphans: true           # Notify about unmerged branches with no open PR (default: true)

# Git auto-merge configuration
# Automatically merges koan/* branches based on rules
git_auto_merge:
  enabled: false                    # Global on/off switch
  base_branch: "main"               # Default target branch for merges
  strategy: "squash"                # merge | squash | rebase
  rules:
    - pattern: "koan/*"             # Branch name pattern (glob-style)
      auto_merge: true              # Enable auto-merge for matching branches
      delete_after_merge: true      # Clean up branch after successful merge

# Schedule — control when deep exploration vs mission-only work happens
# deep_hours: time ranges for deep/contemplative work (higher exploration chance,
#              PR limits relaxed so exploration isn't blocked by pending reviews)
# work_hours: time ranges for mission-only work (exploration suppressed)
# Format: "START-END" using 24h hours. Wraps around midnight: "22-6".
# Multiple ranges: "0-6,22-24". Leave empty to disable.
# NOTE: deep_hours and work_hours should NOT overlap. If they do, deep_hours
# takes priority but work_hours has no effect during the overlap.
# Recommended: use non-overlapping ranges with a gap for normal behavior.
# Example: deep exploration at night (0-8), missions during work day (8-20),
#          normal behavior in the evening (20-24)
# schedule:
#   deep_hours: "0-8"
#   work_hours: "8-20"

# Log rotation — controls backup behavior when processes restart
# Previous logs are preserved as numbered backups (.log.1, .log.2, etc.)
# Older backups (.log.2+) are gzip-compressed to save disk space
# logs:
#   max_backups: 3          # Number of old log files to keep (default: 3)
#   max_size_mb: 50         # Max size per backup in MB (default: 50)
#   compress: true          # Gzip-compress backups .log.2+ (default: true)

# Usage estimation (auto-calibration from Claude JSON output)
# Tune these limits based on your Claude plan by comparing
# estimated % with actual /usage output in Claude CLI
usage:
  session_token_limit: 500000   # Tokens per 5h session window
  weekly_token_limit: 5000000   # Tokens per 7-day window
  budget_mode: session_only     # full | session_only | disabled

# Per-project overrides are now configured in projects.yaml.
# Supported per-project settings:
#   - git_auto_merge: per-project merge rules
#   - cli_provider: override AI provider ("claude", "codex", "copilot", "local")
#   - models: override model selection (mission, chat, lightweight, etc.)
#   - tools: restrict available tools (mission, chat tool lists)
#   - github: override authorized_users for GitHub @mention commands
#   - complexity_routing: per-project override (false to disable, or tier overrides)
# See projects.example.yaml for documentation and examples.

# Complexity routing — pre-classify missions and route to cheapest capable model
# A lightweight Haiku call assigns each mission a tier (trivial/simple/medium/complex)
# before dispatch. The tier drives model selection and max-turns cap, saving quota
# on simple work while reserving expensive models for genuinely complex tasks.
# The tier is cached as [complexity:X] in missions.md so reruns skip re-classification.
# Set enabled: false (or complexity_routing: false per-project) to disable entirely.
# complexity_routing:
#   enabled: true
#   tiers:
#     trivial:
#       model: "haiku"          # Cheapest model for tiny mechanical changes
#       max_turns: 50           # Reduced turn budget
#       timeout_multiplier: 0.5 # Halve the default timeout
#     simple:
#       model: "sonnet"         # Capable model for small self-contained changes
#       max_turns: 100
#       timeout_multiplier: 0.75
#     medium:
#       model: ""               # Empty = use models.mission (no override)
#       max_turns: 100
#       timeout_multiplier: 1.0
#     complex:
#       model: ""               # Empty = use models.mission (no override)
#       max_turns: 500          # Generous turns for architectural work
#       timeout_multiplier: 1.5

# Plan review loop — validates generated plans before posting to GitHub
# A lightweight subagent (Haiku) reviews each plan for missing file paths,
# TODO placeholders, oversized phases, scope creep, and missing tests.
# If issues are found, the plan is re-generated with reviewer feedback
# (up to max_rounds times). Disable if the extra latency is unwanted.
# plan_review:
#   enabled: true       # Run review loop after plan generation (default: true)
#   max_rounds: 3       # Maximum re-generation rounds per plan (default: 3)
#   implement_gate: true  # Run plan-review gate before /implement execution (default: true)

# Prompt injection guard — scans incoming missions for suspicious patterns
# Detects instruction overrides, role confusion, secret extraction, shell injection.
# Complements outbox_scanner (output defense) with input-side defense.
# prompt_guard:
#   enabled: true          # Master switch (default: true)
#   block_mode: true       # true = reject mission entirely (default), false = warn + quarantine

# Dashboard — web UI for monitoring and interacting with Kōan
# When enabled, `make start` / `make stop` / `make restart` also manage
# the dashboard process. You can always run it standalone with `make dashboard`.
# dashboard:
#   enabled: false          # Include dashboard in managed processes (default: false)
#   port: 5001              # HTTP port (default: 5001)

# REST API — HTTP control layer for programmatic access
# Disabled by default. Requires a bearer token to operate (fail-closed).
#
# Authentication:
#   Set KOAN_API_TOKEN=<secret> in your environment (.env) — preferred.
#   Alternatively, set api.token in this file (less secure — in the config tree).
#
# Security:
#   - Binds to 127.0.0.1 by default — safe for local use.
#   - When binding to a non-loopback address, a warning is emitted.
#     Use a reverse proxy (nginx, Caddy) for TLS termination and rate limiting.
#   - Token comparison uses hmac.compare_digest to prevent timing attacks.
#   - Per-request audit log written to logs/api.log (method, path, status, IP).
#
# api:
#   enabled: false          # Include API in managed processes (default: false)
#   host: "127.0.0.1"       # Bind address (default: 127.0.0.1)
#   port: 8420              # HTTP port (default: 8420)
#   threads: 8              # waitress worker threads (default: 8)
#   # token: ""             # Bearer token fallback (prefer KOAN_API_TOKEN env var)

# Automation suggestions — context-aware recurring task proposals
# When the agent is idle (no pending missions, not in focus mode), it can
# generate personalized suggestions for recurring tasks the user should set up.
# Uses a lightweight model to analyze project learnings, existing recurring
# tasks, and cross-project patterns. Suggestions are written to outbox as
# copy-pasteable /daily, /weekly, /every commands.
# suggestions:
#   enabled: true              # Master switch (default: true)
#   min_interval_hours: 24     # Minimum hours between suggestions per project (default: 24)
#   max_per_day: 2             # Maximum suggestions per project per day (default: 2)

# Auto-update — automatically keep Kōan up to date
# When enabled, Kōan periodically checks if upstream has new commits
# and pulls + restarts automatically. Checks run at startup and every
# N iterations. A 2-minute cache prevents excessive git fetches.
# See docs/auto-update.md for full details.
# auto_update:
#   enabled: true           # Master switch (default: false)
#   check_interval: 10      # Check every N iterations (default: 10)
#   notify: true            # Notify on Telegram before/after update (default: true)

# CI dispatch: auto-create fix missions when CI fails on Koan's open PRs.
# Checks GitHub check-runs API each iteration (per-project cooldown).
# ci_dispatch:
#   enabled: true              # Master switch (default: false)
#   cooldown_minutes: 30       # Min time between checks per project (default: 30)
#   log_snippet_bytes: 4096    # Max CI log snippet in mission text (default: 4096)


# memory:
#  learnings_max_lines: 100        # Target after semantic compaction
#  learnings_hard_cap: 200         # Absolute max (safety net)
#  global_personality_max: 150     # Max lines for personality-evolution.md
#  global_emotional_max: 100       # Max lines for emotional-memory.md
#  compaction_interval_hours: 24   # How often cleanup runs
#  log_horizon_days: 365           # Retain JSONL truth log entries for this many days (default: 365)
#  context_window_entries: 20      # Number of recent JSONL entries injected into the agent prompt (default: 20)

# GitHub notification-driven commands
# Enable Kōan to respond to @mentions in GitHub PR/issue comments.
# When a user posts "@nickname rebase" in a PR comment, Kōan reacts with 👍,
# creates a mission, and processes it in the next iteration.
# github:
#   nickname: "koan-bot"            # Bot's GitHub @mention name (required if enabled)
#   commands_enabled: false          # Master switch (default: false)
#   authorized_users: ["*"]          # "*" = all users, or list of GitHub usernames
#   max_age_hours: 24                # Ignore notifications older than this (default: 24)
#   stale_drain_hours: 48            # Multi-instance: drain unregistered-repo notifications
#                                    # older than this (default: 48). Set to 0 to disable.
#   check_interval_seconds: 60       # Optional override; otherwise notification_polling
#   max_check_interval_seconds: 300  # Optional override; otherwise notification_polling
#   reply_enabled: false             # AI replies to non-command @mentions (default: false)
#                                    # When enabled, the bot replies to questions/requests
#                                    # from authorized users with contextual AI-generated answers.
#   reply_authorized_users: ["*"]    # Who can trigger AI replies (default: uses authorized_users)
#                                    # Separate from command permissions — allows broader audience
#                                    # for read-only replies. ["*"] = anyone with repo write access.
#                                    # Safe for private/enterprise repos where all users are trusted.
#                                    # ⚠️ On public repos, ["*"] lets any write-access user trigger
#                                    # Claude sessions — consider named users instead.
#                                    # Omit to fall back to authorized_users. Set [] to disable.
#                                    # Per-project override available in projects.yaml.
#   reply_rate_limit: 5              # Max AI replies per user per hour (default: 5, min: 1)
#                                    # Prevents API quota abuse when replies are open broadly.
#   natural_language: false           # NLP intent parsing for @mentions (default: false)
#                                    # When enabled, unrecognized commands are sent to Claude
#                                    # for intent classification before falling back to error.
#                                    # Per-project override available in projects.yaml.
#   webhook:                          # Push-based triggering (opt-in, default: off)
#     enabled: false                  # Start a local HTTP receiver in the bridge process.
#                                     # On a relevant GitHub event it triggers an IMMEDIATE
#                                     # notification poll (~10s) instead of waiting out the
#                                     # 60-180s polling backoff. Polling stays on as the
#                                     # reliability fallback for missed deliveries.
#     port: 8474                      # Bind port (default: 8474)
#     host: "127.0.0.1"               # Bind host (default: loopback — front with a tunnel
#                                     # like smee.io/cloudflared; use 0.0.0.0 only for direct
#                                     # exposure behind your own TLS terminator)
#   # Secret is read from the KOAN_GITHUB_WEBHOOK_SECRET env var, NOT this file.
#   # Configure the same secret in the GitHub repo webhook settings (content
#   # type application/json). See docs/messaging/github-webhooks.md.

# Jira notification-driven commands
# Enable Kōan to respond to @mentions in Jira issue comments.
# When a user posts "@nickname plan" in a Jira comment, Kōan creates a mission
# and processes it in the next iteration.
# jira:
#   enabled: false                       # Master switch (default: false)
#   base_url: "https://myorg.atlassian.net"  # Jira instance URL (required if enabled)
#   email: "bot@example.com"             # Atlassian account email for Basic auth (required)
#   api_token: ""                        # Jira API token (required); also via KOAN_JIRA_API_TOKEN
#   nickname: "koan-bot"                 # Bot's @mention name in Jira comments (required)
#   commands_enabled: false              # Reserved for future per-command filtering (default: false)
#   authorized_users: ["*"]             # "*" = all users, or list of Jira account emails
#   max_age_hours: 24                    # Ignore comments older than this (default: 24)
#   check_interval_seconds: 60           # Optional override; otherwise notification_polling
#   max_check_interval_seconds: 300      # Optional override; otherwise notification_polling
#   max_issues_per_cycle: 200            # Cap on issues inspected per check (default: 200, min: 1).
#                                        # Each inspected issue triggers a separate /comment API call,
#                                        # so this directly bounds cold-start API consumption.
#                                        # Tighten on small instances; raise if mentions on busy
#                                        # backlogs get dropped (a WARNING logs when the cap fires).
# Jira project key ownership is configured in projects.yaml:
#   issue_tracker:
#     provider: jira
#     jira_project: FOO
#     default_branch: "main"

# Review ignore patterns — exclude files from /review PR diffs.
# Applied before building the Claude prompt, reducing token spend on
# generated code, lock files, and vendor directories.
#
# glob: patterns are matched against the full file path from the diff.
#   - Patterns without '/' match the basename at any depth:
#       "*.lock" matches "package-lock.json", "subdir/yarn.lock"
#   - Patterns with '/' match the full path:
#       "vendor/**" matches "vendor/lodash.js" but not "src/vendor.js"
# regex: patterns are matched against the full file path (Python re.search).
#   A pattern like ".*\.pb\.go$" matches "api/types.pb.go".
#
# When all files are filtered out, the review returns "nothing to review"
# without calling Claude — saving quota entirely.
#
# review_ignore:
#   glob:
#     - "vendor/**"         # all files under vendor/
#     - "*.lock"            # lock files at any depth (yarn.lock, etc.)
#     - "*.min.js"          # minified JS bundles
#   regex:
#     - '.*\.pb\.go$'       # protobuf-generated Go files (full path regex)

# Review triage — content-aware pre-filtering of trivial file changes
# Analyzes each file's diff content to classify it as trivial or worth
# reviewing. Trivial files (lockfiles, generated code, whitespace-only
# changes, renames with no content delta) are removed from the diff before
# the expensive Claude review call, saving tokens. Disabled by default;
# enable for projects with mixed trivial + meaningful changes in PRs.
# review_triage:
#   enabled: true               # Master switch (default: false)
#   skip_lockfiles: true        # Skip package-lock.json, yarn.lock, etc.
#   skip_generated: true        # Skip .min.js, .map, .pb.go, _pb2.py, etc.
#   skip_whitespace_only: true  # Skip files with only indentation/blank changes
#   skip_renames: true          # Skip file renames with no content delta

# Review concurrency — parallel GitHub API calls during code reviews
# When enabled, PR context and comment fetching run concurrently using a
# ThreadPoolExecutor. The LLM call (Claude CLI) is always sequential.
# review_concurrency:
#   enabled: true           # Enable parallel GitHub API fetches (default: true)
#   github_workers: 4       # Max concurrent GitHub API calls (default: 4)

# Review reflection pass — second-pass LLM call to score and filter findings
# After the first-pass review generates file comments, a lightweight model
# scores each finding 0-10. Findings scoring below the threshold are dropped.
# Uses the models.reflect model (defaults to models.lightweight = haiku).
# Set threshold: 0 to disable filtering (all findings pass through).
# review_reflect:
#   threshold: 5            # Min score to keep a finding (0-10, default: 5)

# Dashboard attention zone — GitHub @mention notifications
# When true, the dashboard attention zone also shows unread GitHub @mention
# notifications (reason: mention or review_requested). Requires github_url
# to be set in projects.yaml and the gh CLI to be authenticated.
# Default: false (avoids GitHub API calls for users who haven't configured it).
# attention_github_notifications: false

# Memory compaction — controls how learnings and global memory files are managed
# Learnings files grow append-only from PR reviews and agent experience.
# Compaction uses Claude (lightweight model) to merge redundant entries and
# remove obsolete ones. The hard cap is a safety net that truncates to keep
# the most recent entries if compaction output is still too large.
# Global personality/emotional files are simple tail-truncations (no AI).
# memory:
#   learnings_max_lines: 100        # Target after semantic compaction (default: 100)
#   learnings_hard_cap: 200         # Absolute max, safety net truncation (default: 200)
#   global_personality_max: 150     # Max lines for personality-evolution.md (default: 150)
#   global_emotional_max: 100       # Max lines for emotional-memory.md (default: 100)
#   compaction_interval_hours: 24   # How often to run cleanup (default: 24)
#   max_relevant_learnings: 40      # Top-K learnings injected per mission (default: 40).
#                                   # Lines are ranked by Jaccard word-overlap against
#                                   # the mission text. Set to 0 to keep only the
#                                   # recency hedge below. Bypass with [recall:full]
#                                   # in mission text to load the full file.
#   recall_recent_hedge: 5          # Most recent N lines always included regardless
#                                   # of relevance score (default: 5).
#                                   # Note: setting BOTH max_relevant_learnings: 0
#                                   # and recall_recent_hedge: 0 disables learnings
#                                   # injection entirely (the section is omitted).
#   write_time_dedup: true          # Run a lightweight Claude pass to drop
#                                   # paraphrased duplicates BEFORE appending new
#                                   # PR-review lessons to learnings.md (default: true).
#                                   # Complements the periodic semantic compaction
#                                   # by stopping near-duplicates at the write
#                                   # boundary. Set to false to save quota if you
#                                   # run on a tight burn budget; the periodic pass
#                                   # will still dedup, just less often.
#   max_block_lines: 200            # Hard ceiling on the assembled <memory-context>
#                                   # block injected into every mission and skill
#                                   # prompt (default: 200, matching the on-disk
#                                   # learnings hard cap). When exceeded, parts are
#                                   # truncated in reverse curation order: learnings
#                                   # first, then priorities, then context. A WARNING
#                                   # is logged and a marker is appended so the model
#                                   # knows content was elided. Tune down if you want
#                                   # to actively trim well-behaved instances; tune
#                                   # up only if you've measured the per-mission
#                                   # token budget you want to spend.

# Context trimming — budget-aware prompt reduction (issue #1309)
# When quota is low, the agent prompt is trimmed to save tokens.
# Pressure levels: normal (full context), low (reduced), critical (minimal).
# Pressure is derived from autonomous_mode + available_pct.
# context:
#   low_pressure_pct: 30            # Below this %, switch to low pressure (default: 30)
#   critical_pressure_pct: 15       # Below this %, switch to critical pressure (default: 15)
#   memory_entries: 20              # Memory log entries at normal pressure (default: 20)
#   memory_entries_low: 10          # Memory log entries at low pressure (default: 10)
#   memory_entries_critical: 5      # Memory log entries at critical pressure (default: 5)
#   learnings_k: 40                 # Learnings top-K at normal pressure (default: 40)
#   learnings_k_low: 20             # Learnings top-K at low pressure (default: 20)
#   learnings_k_critical: 10        # Learnings top-K at critical pressure (default: 10)
#   learnings_hedge: 5              # Recency hedge at normal pressure (default: 5)
#   learnings_hedge_low: 3          # Recency hedge at low pressure (default: 3)
#   learnings_hedge_critical: 2     # Recency hedge at critical pressure (default: 2)

# Automation rules — loop guard
# Limits how many times a single automation rule can fire within a 60-second
# window. Prevents runaway loops, e.g. a create_mission rule triggered by
# post_mission that re-queues itself indefinitely.
# The counter is in-memory and resets when the agent restarts.
# automation_rules:
#   max_fires_per_minute: 5   # Per-rule rate limit (default: 5, min: 1)

# Output optimizations — reduce token consumption
# These settings control prompt-level optimizations that reduce output verbosity
# while preserving response quality.
#
# Caveman ("no filler, 3-6 word sentences, direct answers") applies by default
# to the agent loop (regular missions) — that's where the bulk of token cost
# lives.
#
# Skills are **opt-in**: a skill only receives caveman when it declares
# ``caveman: true`` in its SKILL.md frontmatter, OR when its canonical name
# is listed in ``optimizations.caveman.include`` below. Core skills shipping
# with ``caveman: true``: /rebase, /recreate, /squash, /fix, /ci_check,
# /check, /implement.
#
# Set ``enabled: false`` to suppress caveman everywhere (agent loop and skills):
#
# Review compressor — compress large PR diffs before sending to Claude.
# Sorts files by language priority (source code first, lockfiles last) and
# fits as many hunks as possible within an 80k-token budget. Skipped files
# are surfaced in the review comment so reviewers know analysis is partial.
# Enabled by default.
# optimizations:
#   caveman:
#     enabled: true
#     include: [my_custom_skill]   # canonical names; aliases auto-resolved
#   review_compressor:
#     enabled: true

# RTK (Rust Token Killer — https://github.com/rtk-ai/rtk)
#
# Optional CLI proxy that compresses common dev-command output (git, ls,
# cat/read, grep/find, pytest, jest, cargo, gh, docker, kubectl, aws, …) by
# 60-90 % before it reaches Claude.  Strictly complementary to caveman:
#   - caveman trims what Claude WRITES.
#   - rtk     trims what Claude READS.
#
# rtk is **not** a Kōan dependency.  Kōan only:
#   1. Detects the binary at boot (logged once).
#   2. Optionally injects an awareness section into Claude's system prompt
#      so Claude prefers ``rtk <cmd>`` over the raw command.
#   3. Exposes a ``/rtk`` skill for status/setup/uninstall/gain.
#
# Hook installation (``rtk init -g``) only ever happens via explicit
# ``/rtk setup`` from Telegram — Kōan never silently mutates
# ``~/.claude/settings.json``.
#
# optimizations:
#   rtk:
#     enabled: auto         # auto | true | false
#                           #   auto = on iff `rtk` is on PATH (default)
#                           #   true = on regardless of detection
#                           #   false = off everywhere
#     awareness: true       # inject RTK awareness into the system prompt
#     require_jq: true      # warn at boot if `jq` is missing (rtk's
#                           # auto-rewrite hook requires jq)
#
# Per-project opt-out lives in ``projects.yaml``:
#
#   projects:
#     myproject:
#       rtk: false          # never inject awareness for this project
#                           # (e.g. its test runner emits JSON that rtk's
#                           #  filter would clobber)
